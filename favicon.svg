<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Background dark metallic gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- N Path Gradient (Teal to Emerald) -->
    <linearGradient id="nGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- L Path Gradient (Purple to Pink) -->
    <linearGradient id="lGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Roof Gradient (Gold to Orange) -->
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4f46e5" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Dark Gradient Background squircle -->
  <rect width="100" height="100" rx="26" fill="url(#bgGrad)" />
  <rect x="2" y="2" width="96" height="96" rx="24" stroke="white" stroke-width="1.5" stroke-opacity="0.1" fill="none" />

  <!-- Soft backglow -->
  <circle cx="50" cy="50" r="30" fill="#4f46e5" opacity="0.15" filter="url(#glow)" />

  <!-- Roof / House top (Gold to Orange) -->
  <path d="M 18 42 L 48 18 L 78 42" stroke="url(#roofGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />

  <!-- 'N' Monogram (Teal to Emerald) -->
  <path d="M 26 66 L 26 34 L 46 66 L 46 34" stroke="url(#nGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- 'L' Monogram (Purple to Pink) -->
  <path d="M 58 42 L 58 66 L 78 66" stroke="url(#lGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
