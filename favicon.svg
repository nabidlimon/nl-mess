<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Monogram Stroke Gradient -->
    <linearGradient id="nlGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
  </defs>

  <!-- Blue Background Rounded Rect -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)" />

  <!-- Monogram Paths with exact geometry matching user requirements -->
  <!-- Left Vertical Stem of N -->
  <path d="M 24 32 L 24 72" stroke="url(#nlGrad)" stroke-width="5.5" stroke-linecap="butt" stroke-linejoin="round" fill="none" />

  <!-- Diagonal of N -->
  <path d="M 24 32 L 44 64" stroke="url(#nlGrad)" stroke-width="5.5" stroke-linecap="butt" stroke-linejoin="round" fill="none" />

  <!-- Roof / Outer Wall -->
  <path d="M 34.5 37 L 50 23 L 70 41 L 70 65" stroke="url(#nlGrad)" stroke-width="5.5" stroke-linecap="butt" stroke-linejoin="round" fill="none" />

  <!-- Inner 'L' -->
  <path d="M 50 33 L 50 63 C 50 69 54 69 60 69 L 76 69" stroke="url(#nlGrad)" stroke-width="5.5" stroke-linecap="butt" stroke-linejoin="round" fill="none" />
</svg>
